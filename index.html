<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MotoStat! Which Superbike Delivers the Most Power per CC?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0A0005;--bg2:#12000A;--bg3:#1A0010;
  --card:rgba(20,0,12,0.85);--card2:rgba(28,0,18,0.9);
  --border:rgba(255,30,120,0.12);--border2:rgba(255,30,120,0.25);
  --text:#F5EEF2;--muted:#A08898;--faint:#2A0018;
  --pink:#FF1E78;--pink2:#FF5CA8;
  --rose:#FF6B9D;--magenta:#CC00AA;
  --gold:#FFD200;--green:#00E87A;--cyan:#00D4FF;
  --kaw:#39D448;--bmw:#1A6FD4;--honda:#E8001D;--suz:#FF6B00;--yam:#4455CC;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;}

/* ══ HERO BIKE BACKGROUND ══ */
.bike-bg{
  position:fixed;inset:0;z-index:0;
  background:
    url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=1600&q=80') center/cover no-repeat;
}
/* heavy dark overlay so text is readable */
.bike-bg::after{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(135deg, rgba(10,0,5,0.92) 0%, rgba(10,0,5,0.75) 50%, rgba(10,0,5,0.88) 100%);
}
/* pink/magenta color tint layer */
.bike-bg::before{
  content:'';position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 60% 70% at 15% 50%, rgba(204,0,170,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 30%, rgba(255,30,120,0.12) 0%, transparent 55%);
}
.bg-grain{
  position:fixed;inset:0;z-index:1;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4;pointer-events:none;
}
/* top & bottom accent lines */
.accent-top{position:fixed;top:58px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pink),var(--magenta),transparent);opacity:.5;z-index:50;}
.accent-bot{position:fixed;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--magenta),var(--pink),transparent);opacity:.4;z-index:50;}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  background:rgba(8,0,5,0.94);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.logo{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--text);}
.logo em{color:var(--pink);font-style:normal;}
.logo-flag{display:grid;grid-template-columns:1fr 1fr;gap:1.5px;}
.logo-flag span{width:7px;height:7px;}
.logo-flag span:nth-child(1),.logo-flag span:nth-child(4){background:var(--text);}
.logo-flag span:nth-child(2),.logo-flag span:nth-child(3){background:var(--bg);}
.nav-tabs{display:flex;gap:2px;}
.nt{background:none;border:none;cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:11.5px;font-weight:500;
  color:var(--muted);padding:6px 12px;border-radius:4px;
  transition:all .2s;position:relative;}
.nt:hover{color:var(--text);background:rgba(255,30,120,0.07);}
.nt.on{color:var(--pink2);}
.nt.on::after{content:'';position:absolute;bottom:-1px;left:8px;right:8px;height:2px;background:var(--pink);border-radius:1px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-pill{font-size:10.5px;font-weight:600;letter-spacing:.5px;color:var(--muted);}
.ndots{display:flex;gap:5px;}
.ndot{width:5px;height:5px;border-radius:50%;background:var(--faint);transition:all .3s;}
.ndot.on{background:var(--pink);transform:scale(1.3);}

/* ══ PAGE SYSTEM ══ */
.wrap{position:fixed;inset:0;top:58px;z-index:10;}
.page{
  position:absolute;inset:0;overflow-y:auto;padding:32px 40px;
  opacity:0;pointer-events:none;
  transition:opacity .38s ease,transform .38s ease;
  transform:translateX(28px);
}
.page.on{opacity:1;pointer-events:all;transform:translateX(0);}
.page.bye{opacity:0;transform:translateX(-28px);}
.page::-webkit-scrollbar{width:3px;}
.page::-webkit-scrollbar-thumb{background:rgba(255,30,120,0.3);border-radius:2px;}

/* ══ LAYOUT ══ */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.ga{grid-column:1/-1;}
.mb{margin-bottom:14px;}

/* ══ CARDS ══ */
.card{
  background:rgba(15,0,10,0.82);
  border:1px solid var(--border);border-radius:10px;padding:22px;
  backdrop-filter:blur(12px);
}
.ct{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  margin-bottom:14px;display:flex;align-items:center;gap:7px;
}
.ct::before{content:'';display:block;width:3px;height:12px;background:var(--pink);border-radius:1px;flex-shrink:0;}

/* ══ KPI ══ */
.kpi{
  background:rgba(15,0,10,0.82);border:1px solid var(--border);border-radius:10px;
  padding:18px 20px;position:relative;overflow:hidden;backdrop-filter:blur(12px);
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kpi.kp::before{background:var(--pink);}
.kpi.kg::before{background:var(--green);}
.kpi.kc::before{background:var(--cyan);}
.kpi.km::before{background:var(--magenta);}
.kpi-l{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.kpi-v{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1;color:var(--text);margin-bottom:3px;}
.kpi-s{font-size:12px;color:var(--muted);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:2px;margin-top:6px;}
.bp{background:rgba(255,30,120,.15);color:var(--pink2);}
.bg-b{background:rgba(0,232,122,.12);color:var(--green);}
.bc{background:rgba(0,212,255,.12);color:var(--cyan);}
.bm{background:rgba(204,0,170,.15);color:#DD44CC;}
.by{background:rgba(255,210,0,.12);color:var(--gold);}

/* ══ TABLE ══ */
table.dt{width:100%;border-collapse:collapse;font-size:13px;}
table.dt th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
table.dt td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text);}
table.dt tr:last-child td{border:none;}
table.dt tr:hover td{background:rgba(255,30,120,.04);}
code{background:rgba(255,30,120,.1);color:var(--pink2);padding:1px 6px;border-radius:3px;font-size:11.5px;font-family:'Courier New',monospace;}

/* ══ ALERT ══ */
.alert{background:rgba(232,0,29,.08);border:1px solid rgba(232,0,29,.22);border-radius:8px;padding:14px 18px;display:flex;gap:12px;}
.alert-t{font-size:13.5px;font-weight:600;color:#FF6680;margin-bottom:3px;}
.alert-d{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* ══ STEP ══ */
.step{display:flex;gap:14px;margin-bottom:16px;}
.step-n{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--magenta));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:#fff;}
.step-t{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:3px;}
.step-d{font-size:13px;color:var(--muted);line-height:1.6;}

/* ══ VERDICT ══ */
.verd{background:rgba(15,0,10,0.82);border:1px solid var(--border);border-left:3px solid;border-radius:0 10px 10px 0;padding:18px 20px;backdrop-filter:blur(12px);}
.verd.vg{border-left-color:var(--green);}
.verd.vp{border-left-color:var(--pink);}
.verd.vc{border-left-color:var(--cyan);}
.v-rq{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.v-a{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}
.v-d{font-size:13px;color:var(--muted);line-height:1.6;}
.vtag{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:2px;margin-top:8px;}

/* ══ PAGE NAV ══ */
.pnav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--border);}
.pn{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);border-radius:4px;padding:8px 18px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .2s;}
.pn:hover{border-color:var(--pink);color:var(--pink);}
.pn.pr{background:linear-gradient(135deg,var(--pink),var(--magenta));border:none;color:#fff;box-shadow:0 4px 20px rgba(255,30,120,0.35);}
.pn.pr:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,30,120,0.5);}

/* ══ CHART ══ */
.cw{position:relative;width:100%;}

/* ══ INSIGHT ══ */
.insight{background:rgba(255,30,120,.06);border:1px solid rgba(255,30,120,.15);border-radius:8px;padding:12px 16px;margin-top:10px;display:flex;gap:9px;align-items:flex-start;}
.insight-d{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* ══ HERO PAGE ══ */
#p1{padding:0;display:flex;flex-direction:column;overflow:hidden;}
.hero{display:flex;align-items:center;padding:44px 52px 24px;flex:1;gap:52px;}
.h-left{flex:1;max-width:560px;z-index:2;}
.hook{
  font-size:14.5px;font-weight:400;font-style:italic;color:#C09AAE;
  border-left:2px solid var(--pink);padding-left:14px;
  margin-bottom:22px;line-height:1.65;
}
.h-eye{font-size:10.5px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--pink2);display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.h-eye::before{content:'';width:20px;height:1px;background:var(--pink);}
.h-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:70px;letter-spacing:2px;line-height:.92;
  color:var(--text);margin-bottom:6px;
  text-shadow:0 0 80px rgba(255,30,120,0.25),0 2px 4px rgba(0,0,0,0.5);
}
.h-title .ca{color:var(--pink);}
.h-sub{
  font-size:15.5px;font-weight:400;color:#C5AABB;
  line-height:1.72;margin-bottom:28px;max-width:440px;
}
/* stats row */
.h-stats{
  display:flex;gap:0;margin-bottom:28px;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;
  background:rgba(10,0,6,0.6);backdrop-filter:blur(12px);
}
.hs{flex:1;padding:14px 10px;text-align:center;border-right:1px solid var(--border);}
.hs:last-child{border-right:none;}
.hs-icon{font-size:20px;margin-bottom:6px;}
.hs-v{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--pink);line-height:1;}
.hs-l{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
/* CTA */
.cta-row{display:flex;align-items:center;gap:12px;}
.cta{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--pink),var(--magenta));
  color:#fff;border:none;cursor:pointer;
  font-size:13.5px;font-weight:700;letter-spacing:.5px;
  padding:14px 30px;border-radius:7px;
  transition:all .3s;
  box-shadow:0 4px 28px rgba(255,30,120,0.4);
}
.cta:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 40px rgba(255,30,120,0.55);}
.cta-ghost{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(10,0,6,0.6);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  font-size:12px;font-weight:500;
  padding:13px 20px;border-radius:7px;transition:all .25s;
  backdrop-filter:blur(12px);
}
.cta-ghost:hover{border-color:var(--pink2);color:var(--pink2);}

/* right mini stats */
.h-right{flex-shrink:0;display:flex;flex-direction:column;gap:10px;z-index:2;}
.mini-kpi{
  background:rgba(12,0,8,0.88);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;width:210px;
  transition:all .3s;cursor:default;backdrop-filter:blur(16px);
}
.mini-kpi:hover{border-color:var(--border2);transform:translateX(-4px);box-shadow:-4px 0 20px rgba(255,30,120,0.1);}
.mk-l{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.mk-v{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px;line-height:1;}
.mk-d{font-size:10.5px;color:var(--muted);margin-top:3px;}

/* brand strip */
.b-strip{
  display:grid;grid-template-columns:repeat(5,1fr);
  border-top:1px solid var(--border);
  background:rgba(6,0,4,0.75);backdrop-filter:blur(20px);
}
.bs{
  padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:background .2s;position:relative;
}
.bs:hover{background:rgba(255,30,120,.08);}
.bs:not(:last-child){border-right:1px solid var(--border);}
.bs-color-bar{height:3px;width:80%;border-radius:2px;transition:width .3s;}
.bs:hover .bs-color-bar{width:95%;}
.bs-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--muted);transition:color .2s;}
.bs:hover .bs-name{color:var(--text);}
.bs-eff{font-size:10px;color:var(--faint);transition:color .2s;}
.bs:hover .bs-eff{color:var(--muted);}
.bs-tip{
  display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:rgba(15,0,10,0.97);border:1px solid var(--border2);border-radius:6px;
  padding:8px 14px;white-space:nowrap;font-size:11.5px;color:var(--text);
  pointer-events:none;z-index:100;backdrop-filter:blur(12px);
}
.bs:hover .bs-tip{display:block;}

/* bike animation */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.bike-float{animation:float 3.2s ease-in-out infinite;
position: absolute;
bottom: 30px;
right: 50px;
width: 150px;
z-index: 100;
}
.wr{transform-box:fill-box;transform-origin:center center;animation:spin 2s linear infinite;}
.wf{transform-box:fill-box;transform-origin:center center;animation:spin 2s linear infinite;}

/* ══ ABOUT ══ */
.about-bar{
  background:rgba(15,0,10,0.85);
  border:1px solid var(--border2);border-radius:10px;
  padding:10px 15px;display:flex;gap:24px;align-items:center;margin-bottom:30px;width:fit-content;
  backdrop-filter:blur(12px);
}
.about-ava{width:35px;height:35px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--magenta));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;flex-shrink:0;}
.about-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;}
.about-p{font-size:10px;color:var(--muted);line-height:1.65;}
.about-links{display:flex;gap:8px;margin-top:10px;}
.alink{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;color:var(--muted);border:1px solid var(--border);padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .2s;background:none;}
.alink:hover{color:var(--pink2);border-color:var(--border2);}

/* ══ BRAND CARDS ══ */
.brand-grid-int{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.brand-card{
  background:rgba(15,0,10,0.82);border:1px solid var(--border);border-radius:8px;
  padding:14px;cursor:pointer;transition:all .25s;text-align:center;backdrop-filter:blur(10px);
}
.brand-card:hover,.brand-card.sel{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,30,120,0.15);}
.bc-dot{width:12px;height:12px;border-radius:50%;margin:0 auto 8px;}
.bc-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:4px;}
.bc-stat{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--pink);line-height:1;}
.bc-label{font-size:10px;color:var(--muted);margin-top:2px;}

/* ══ HEATMAP ══ */
#hmDiv table{width:100%;border-collapse:separate;border-spacing:3px;}
#hmDiv th{padding:6px 8px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;text-align:center;}
#hmDiv th:first-child{text-align:left;}
#hmDiv td{padding:9px 10px;border-radius:5px;text-align:center;font-size:11.5px;}

/* ══ CORR ══ */
#corrDiv table{width:100%;border-collapse:separate;border-spacing:3px;}
#corrDiv th,#corrDiv td{padding:7px 9px;text-align:center;border-radius:4px;font-size:11.5px;}
#corrDiv th{color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:9.5px;font-weight:700;letter-spacing:1.5px;background:transparent;}

/* ══ TROPHY ══ */
.trophy{
  background:linear-gradient(135deg,rgba(255,210,0,.07),rgba(255,30,120,.06),rgba(204,0,170,.05));
  border:1px solid rgba(255,210,0,.2);border-radius:12px;
  padding:26px 28px;text-align:center;margin-bottom:14px;backdrop-filter:blur(12px);
}
.t-icon{font-size:44px;margin-bottom:10px;}
.t-title{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.t-sub{font-size:13.5px;color:var(--muted);line-height:1.65;}

/* ══ PAGE HEADER ══ */
.ph{margin-bottom:26px;}
.ph-tag{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--pink);border:1px solid rgba(255,30,120,.28);padding:3px 11px;border-radius:2px;margin-bottom:12px;}
.ph-tag::before{content:'';width:16px;height:1px;background:var(--pink);}
.ph-h{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;line-height:.95;color:var(--text);margin-bottom:10px;text-shadow:0 0 40px rgba(255,30,120,0.2);}
.ph-h span{color:var(--pink);}
.ph-p{font-size:14.5px;color:#B09BAC;line-height:1.7;max-width:620px;font-weight:400;}
</style>
</head>
<body>

<!-- BACKGROUNDS -->
<div class="bike-bg"></div>
<div class="bg-grain"></div>
<div class="accent-top"></div>
<div class="accent-bot"></div>

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="logo-flag"><span></span><span></span><span></span><span></span></div>
    MOTO<em>STAT</em>
  </div>
  <div class="nav-tabs">
    <button class="nt on" data-p="0">Overview</button>
    <button class="nt" data-p="1">Data Overview</button>
    <button class="nt" data-p="2">Data Cleaning</button>
    <button class="nt" data-p="3">Exploratory Analysis</button>
    <button class="nt" data-p="4">Brand Analysis</button>
    <button class="nt" data-p="5">Research Answers</button>
    <button class="nt" data-p="6">Conclusions</button>
  </div>
  <div class="nav-right">
    <span class="nav-pill" id="pgCtr">01/07</span>
    <div class="ndots" id="ndots"></div>
  </div>
</nav>

<!-- ═════ WRAP ═════ -->

        <div class="step"><div class="step-n">1</div><div><div class="step-t">Extract the number from messy text</div><div class="step-d">We used a pattern-matching rule to pull the first number out of any text string. So <code>'39 PS @ 11000 rpm'</code> becomes simply <code>39</code> — regardless of what comes before or after it.</div></div></div>
        <div class="step"><div class="step-n">2</div><div><div class="step-t">Convert European PS units to HP</div><div class="step-d">Some manufacturers report power in PS (the German unit). 1 PS = 0.9863 HP. We detected which values used PS and applied the conversion so every bike speaks the same unit.</div></div></div>
        <div class="step"><div class="step-n">3</div><div><div class="step-t">Calculate the Efficiency score</div><div class="step-d">With clean HP and CC values, we calculated: <code>Efficiency = HP ÷ CC</code>. This single number normalises power across different engine sizes — the heart of our analysis.</div></div></div>
        <div class="step"><div class="step-n">4</div><div><div class="step-t">Remove physically impossible values</div><div class="step-d">Real motorcycles score between 0.05 and 0.25 HP/CC. We removed any records outside this range — including one BMW entry that showed <strong style="color:var(--pink);">140 HP/CC</strong>, clearly a data typo.</div></div></div>
      </div>
    </div>

<script>
/* ── PAGE SYSTEM ── */
const IDS=['p1','p2','p3','p4','p5','p6','p7'];
const nts=document.querySelectorAll('.nt');
const pgCtr=document.getElementById('pgCtr');
const ndots=document.getElementById('ndots');
let cur=0;const built=new Array(7).fill(false);built[0]=true;
IDS.forEach((_,i)=>{const d=document.createElement('div');d.className='ndot'+(i===0?' on':'');ndots.appendChild(d);});
function go(idx){
  if(idx===cur)return;
  document.getElementById(IDS[cur]).classList.replace('on','bye');
  setTimeout(()=>document.getElementById(IDS[cur]).classList.remove('bye'),400);
  document.getElementById(IDS[idx]).classList.add('on');
  document.getElementById(IDS[idx]).scrollTop=0;
  nts[cur].classList.remove('on');nts[idx].classList.add('on');
  ndots.children[cur].classList.remove('on');ndots.children[idx].classList.add('on');
  pgCtr.textContent=String(idx+1).padStart(2,'0')+'/07';
  cur=idx;
  if(!built[idx]){built[idx]=true;setTimeout(()=>mkCharts(idx),60);}
}
nts.forEach((b,i)=>b.addEventListener('click',()=>go(i)));

/* ── COUNT-UP ── */
function countUp(el,target,suffix,dur){
  if(!el)return;let s=0;const step=target/55;
  const t=setInterval(()=>{s=Math.min(s+step,target);el.textContent=Math.round(s)+suffix;if(s>=target)clearInterval(t);},dur/55);
}
setTimeout(()=>{
  countUp(document.getElementById('sB'),5,'',700);
  countUp(document.getElementById('sM'),400,'+',900);
  countUp(document.getElementById('sR'),3,'',600);
},350);

/* ── BRAND CARD INTERACTION ── */
document.getElementById('brandCards')?.addEventListener('click',e=>{
  const bc=e.target.closest('.brand-card');if(!bc)return;
  document.querySelectorAll('.brand-card').forEach(c=>c.classList.remove('sel'));
  bc.classList.add('sel');
});

/* ── CHARTS ── */
const BC={Kawasaki:'#39D448',Yamaha:'#4455CC',Honda:'#E8001D',BMW:'#1A6FD4',Suzuki:'#FF6B00'};
const BN=['Kawasaki','Yamaha','Honda','BMW','Suzuki'];
const BCL=['#39D448','#4455CC','#E8001D','#1A6FD4','#FF6B00'];
Chart.defaults.color='#A08898';
Chart.defaults.borderColor='rgba(255,30,120,0.08)';
Chart.defaults.font.family="'Plus Jakarta Sans',sans-serif";
Chart.defaults.font.size=11;

function mk(id,cfg){const el=document.getElementById(id);if(!el)return null;return new Chart(el,cfg);}

function mkCharts(idx){
  if(idx===3)buildEDA();
  if(idx===4)buildBrand();
  if(idx===5)buildRQ();
}

function buildEDA(){
  mk('cBrandCount',{type:'bar',
    data:{labels:['Honda','Yamaha','Kawasaki','BMW','Suzuki'],datasets:[{data:[95,85,80,75,65],backgroundColor:['#E8001D','#4455CC','#39D448','#1A6FD4','#FF6B00'],borderRadius:5,barPercentage:.55,borderColor:'transparent'}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ~${c.raw} models`}}},scales:{x:{grid:{color:'rgba(255,30,120,0.06)'}},y:{grid:{display:false},ticks:{color:'#F5EEF2',font:{weight:'500'}}}}}
  });

  const rows=[
    ['','CC','HP','Efficiency','Year'],
    ['CC','1.000','+0.790','−0.320','+0.068'],
    ['HP','+0.790','1.000','+0.210','+0.095'],
    ['Efficiency','−0.320','+0.210','1.000','+0.041'],
    ['Year','+0.068','+0.095','+0.041','1.000']
  ];
  function rbg(v){const n=parseFloat(v.replace('−','-'));if(isNaN(n)||v==='1.000')return v==='1.000'?'rgba(255,210,0,0.16)':'transparent';if(n>0.5)return'rgba(255,30,120,0.2)';if(n>0)return'rgba(255,30,120,0.08)';if(n>-0.2)return'rgba(255,150,0,0.08)';return'rgba(255,150,0,0.18)';}
  function rfc(v){const n=parseFloat(v.replace('−','-'));if(isNaN(n))return'#A08898';if(v==='1.000')return'#FFD200';if(n>0)return'#FF5CA8';return'#FFB366';}
  let h='<table><tr>';
  rows[0].forEach((c,i)=>{h+=`<th style="text-align:${i===0?'left':'center'};font-size:9.5px;">${c}</th>`;});h+='</tr>';
  rows.slice(1).forEach(r=>{h+='<tr>';r.forEach((c,i)=>{h+=`<td style="background:${i===0?'transparent':rbg(c)};color:${i===0?'#F5EEF2':rfc(c)};font-weight:${i===0?'600':'400'};text-align:${i===0?'left':'center'};padding:7px 8px;border-radius:4px;">${c}</td>`;});h+='</tr>';});
  h+='</table>';
  document.getElementById('corrDiv').innerHTML=h;

  const pts={Kawasaki:[{x:296,y:39},{x:399,y:45},{x:650,y:68},{x:998,y:203},{x:1043,y:160}],BMW:[{x:313,y:34},{x:649,y:77},{x:853,y:95},{x:999,y:210},{x:1254,y:130}],Honda:[{x:286,y:30},{x:471,y:47},{x:649,y:94},{x:999,y:189},{x:1084,y:102}],Suzuki:[{x:248,y:26},{x:645,y:76},{x:776,y:110},{x:999,y:199}],Yamaha:[{x:321,y:42},{x:689,y:75},{x:847,y:113},{x:998,y:200},{x:1199,y:150}]};
  mk('cScatter',{type:'scatter',
    data:{datasets:BN.map(b=>({label:b,data:pts[b],backgroundColor:BC[b]+'BB',pointRadius:7,pointHoverRadius:9,pointBorderColor:'transparent'}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#A08898',boxWidth:9,padding:16,usePointStyle:true}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw.x}cc → ${c.raw.y} HP`}}},scales:{x:{title:{display:true,text:'Engine Size (CC)',color:'#A08898'},grid:{color:'rgba(255,30,120,0.06)'}},y:{title:{display:true,text:'Horsepower (HP)',color:'#A08898'},grid:{color:'rgba(255,30,120,0.06)'}}}}
  });
}

function buildBrand(){
  mk('cBrandEff',{type:'bar',
    data:{labels:BN,datasets:[{data:[0.1518,0.1504,0.1440,0.1380,0.1340],backgroundColor:BCL,borderRadius:6,barPercentage:.55,borderColor:'transparent'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(4)} HP/CC`}}},scales:{y:{min:.10,max:.18,ticks:{callback:v=>v.toFixed(3)},grid:{color:'rgba(255,30,120,0.06)'}},x:{ticks:{color:'#F5EEF2'},grid:{display:false}}}}
  });
  mk('cClassLine',{type:'line',
    data:{labels:['Small\n<400cc','Mid\n400-699cc','Sport\n700-949cc','Superbike\n950cc+'],datasets:[{data:[0.1480,0.1450,0.1400,0.1320],borderColor:'#FF1E78',backgroundColor:'rgba(255,30,120,0.08)',fill:true,tension:.4,pointBackgroundColor:'#FF1E78',pointBorderColor:'#F5EEF2',pointBorderWidth:2,pointRadius:7,borderWidth:2.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(4)} HP/CC`}}},scales:{y:{min:.11,max:.17,ticks:{callback:v=>v.toFixed(3)},grid:{color:'rgba(255,30,120,0.06)'}},x:{ticks:{color:'#F5EEF2',font:{size:10}},grid:{display:false}}}}
  });

  const hd={Kawasaki:[0.1220,0.1380,0.1490,0.1638],Yamaha:[0.1150,0.1370,0.1480,0.1640],Honda:[0.1180,0.1310,0.1450,0.1598],BMW:[null,0.1280,0.1420,0.1520],Suzuki:[0.1090,0.1250,0.1380,0.1570]};
  const allV=Object.values(hd).flat().filter(v=>v!==null);
  const mn=Math.min(...allV),mx=Math.max(...allV);
  function hcol(v){const t=(v-mn)/(mx-mn);const r=Math.round(20+(255-20)*t*0.5),g=Math.round(0+(30-0)*t),bl=Math.round(10+(120-10)*t);return`rgba(${r},${g},${bl},${0.15+t*0.65})`;}
  let ht='<table><tr><th></th>';
  ['Small &lt;400cc','Mid 400–699cc','Sport 700–949cc','Superbike 950cc+'].forEach(c=>{ht+=`<th>${c}</th>`;});ht+='</tr>';
  BN.forEach(b=>{
    ht+=`<tr><td style="text-align:left;padding:8px 10px;color:#F5EEF2;font-weight:600;white-space:nowrap;"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${BC[b]};margin-right:6px;"></span>${b}</td>`;
    hd[b].forEach(v=>{
      if(v===null){ht+=`<td style="color:#2A0018;font-size:11px;">—</td>`;return;}
      const t=(v-mn)/(mx-mn);
      ht+=`<td style="background:${hcol(v)};color:${t>0.5?'#FFB8D8':'#E07899'};font-weight:${t>0.6?600:400};">${v.toFixed(4)}</td>`;
    });ht+='</tr>';
  });ht+='</table>';
  document.getElementById('hmDiv').innerHTML=ht;
}

function buildRQ(){
  mk('cEntry',{type:'bar',
    data:{labels:['Kawasaki','Honda','Yamaha','Suzuki'],datasets:[{data:[0.1220,0.1180,0.1150,0.1090],backgroundColor:['#39D448','#E8001D','#4455CC','#FF6B00'],borderRadius:5,barPercentage:.55,borderColor:'transparent'}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(4)} HP/CC`}}},scales:{x:{min:.08,max:.14,ticks:{callback:v=>v.toFixed(3)},grid:{color:'rgba(255,30,120,0.06)'}},y:{ticks:{color:'#F5EEF2'},grid:{display:false}}}}
  });
  mk('cDim',{type:'line',
    data:{labels:['Small','Mid','Sport','Superbike'],datasets:[{data:[0.1480,0.1450,0.1400,0.1320],borderColor:'#FFD200',backgroundColor:'rgba(255,210,0,0.08)',fill:true,tension:.4,pointBackgroundColor:'#FFD200',pointBorderColor:'#F5EEF2',pointBorderWidth:2,pointRadius:6,borderWidth:2.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:.11,max:.17,ticks:{callback:v=>v.toFixed(3)},grid:{color:'rgba(255,30,120,0.06)'}},x:{ticks:{color:'#F5EEF2'},grid:{display:false}}}}
  });
  mk('cLiter',{type:'bar',
    data:{labels:['Yamaha','Kawasaki','Honda','Suzuki','BMW'],datasets:[
      {label:'Mean',data:[0.1640,0.1638,0.1598,0.1570,0.1520],backgroundColor:['#4455CC','#39D448','#E8001D','#FF6B00','#1A6FD4'],borderRadius:5,barPercentage:.4,borderColor:'transparent'},
      {label:'Peak',data:[0.1720,0.1715,0.1680,0.1640,0.1590],backgroundColor:['rgba(68,85,204,.28)','rgba(57,212,72,.28)','rgba(232,0,29,.28)','rgba(255,107,0,.28)','rgba(26,111,212,.28)'],borderRadius:5,barPercentage:.4,borderColor:'transparent'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#A08898',boxWidth:8,padding:12}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw.toFixed(4)}`}}},scales:{y:{min:.13,max:.19,ticks:{callback:v=>v.toFixed(3)},grid:{color:'rgba(255,30,120,0.06)'}},x:{ticks:{color:'#F5EEF2'},grid:{display:false}}}}
  });
}
</script>
